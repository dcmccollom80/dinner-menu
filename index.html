    <script>
        // REPLACE WITH YOUR ACTUAL GOOGLE SHEET ID
        const SHEET_ID = '1c3oJ4NcbFKZcJVkf-vgXTa4VCmyN0u9GAtHhxIIjhNU'; 
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function fetchMenu() {
            try {
                const response = await fetch(URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const text = await response.text();
                
                // Clean up Google's wrapper safely
                const startIdx = text.indexOf('{');
                const endIdx = text.lastIndexOf('}');
                if (startIdx === -1 || endIdx === -1) {
                    throw new Error('Google returned invalid data structure');
                }
                
                const jsonString = text.substring(startIdx, endIdx + 1);
                const data = JSON.parse(jsonString);
                
                const rows = data.table.rows;
                const menuList = document.getElementById('menu-list');
                menuList.innerHTML = ''; 

                rows.forEach((row, index) => {
                    // Skip the very first row if it's just headers like "Day" and "Meal"
                    if (index === 0 && row.c[0] && row.c[0].v && row.c[0].v.toLowerCase() === 'day') {
                        return; 
                    }

                    // Safely grab whatever is in the first two columns
                    const day = (row.c[0] && row.c[0].v !== null) ? row.c[0].v : '';
                    const meal = (row.c[1] && row.c[1].v !== null) ? row.c[1].v : '---';

                    // Only add the row if it isn't completely empty
                    if (day || meal !== '---') {
                        const itemHtml = `
                            <div class="menu-item">
                                <span class="day">${day}</span>
                                <span class="meal">${meal}</span>
                            </div>
                        `;
                        menuList.innerHTML += itemHtml;
                    }
                });
                
                if (menuList.innerHTML === '') {
                    menuList.innerHTML = '<div class="menu-item" style="color:#ffcc00;">Sheet is empty!</div>';
                }

            } catch (error) {
                console.error("Error details:", error);
                // Displays the exact error text on your screen to help us debug
                document.getElementById('menu-list').innerHTML = `
                    <div class="menu-item" style="color: #ff6666; font-size: 0.8rem; text-align: center;">
                        Error: ${error.message}<br>Check column placement.
                    </div>`;
            }
        }

        fetchMenu();
        setInterval(fetchMenu, 30 * 60 * 1000);
    </script>
