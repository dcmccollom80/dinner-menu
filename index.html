<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Dinner Menu</title>
    <style>
        /* Force the exact widget size for DAKboard */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Blends with DAKboard background */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            width: 400px;  /* Adjust to your DAKboard widget width */
            height: 500px; /* Adjust to your DAKboard widget height */
            overflow: hidden;
        }

        .menu-container {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            padding: 20px;
            background: rgba(30, 30, 30, 0.75); /* Sleek dark glassmorphism */
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin: 0 0 15px 0;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffcc00; /* Accent color */
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .day {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: #aaaaaa;
            width: 30%;
        }

        .meal {
            font-size: 1.05rem;
            width: 70%;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Prevents text wrap breaking the layout */
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h2>Dinner Menu</h2>
        <div id="menu-list" class="menu-list">
            <div class="menu-item"><span class="day">Loading...</span></div>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR ACTUAL GOOGLE SHEET ID
        const SHEET_ID = '2PACX-1vS7_L7p9WPTwCUcVpQO9CO-wgKddfDbEOt1aKztIUwTM3_lFZ5HDvczSAsmz_abw0jqXX22SXWwW_b1'; 
        // Base URL to fetch the public sheet data as JSON
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function fetchMenu() {
            try {
                const response = await fetch(URL);
                const text = await response.text();
                
                // The Google API returns data wrapped in a function callback; this cleans it into pure JSON
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);
                
                const rows = data.table.rows;
                const menuList = document.getElementById('menu-list');
                menuList.innerHTML = ''; // Clear loading text

                rows.forEach(row => {
                    // row.c[0] is Day, row.c[1] is Meal
                    const day = row.c[0] ? row.c[0].v : '';
                    const meal = row.c[1] ? row.c[1].v : '---';

                    const itemHtml = `
                        <div class="menu-item">
                            <span class="day">${day}</span>
                            <span class="meal">${meal}</span>
                        </div>
                    `;
                    menuList.innerHTML += itemHtml;
                });
            } catch (error) {
                console.error("Error fetching menu:", error);
                document.getElementById('menu-list').innerHTML = '<div class="menu-item">Error loading menu</div>';
            }
        }

        // Load menu on page load
        fetchMenu();
        
        // Auto-refresh every 30 minutes to catch updates while DAKboard runs
        setInterval(fetchMenu, 30 * 60 * 1000);
    </script>
</body>
</html>
